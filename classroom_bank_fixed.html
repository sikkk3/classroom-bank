<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a3a5c;--accent:#e8b84b;--success:#2d9e6b;--danger:#d94f4f;
  --bg:#f5f3ee;--card:#fff;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--muted:#888;
}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:40px;width:360px;max-width:100%}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .badge{background:var(--accent);color:var(--primary);border-radius:6px;padding:4px 12px;font-size:14px;font-weight:700;display:inline-block;margin-bottom:8px}
.login-logo h1{font-size:22px;font-weight:700;color:var(--primary)}
.login-logo p{font-size:13px;color:var(--muted);margin-top:4px}
.login-type-tabs{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:20px}
.login-type-tab{flex:1;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border:none;background:transparent;transition:.15s}
.login-type-tab.active{background:white;color:var(--text)}
.fl{display:flex;flex-direction:column;gap:12px}
.fi{display:flex;flex-direction:column;gap:4px}
.fi label{font-size:12px;color:var(--muted)}
.fi input,.fi select{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);width:100%}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--primary)}
.btn-login{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-login:hover{opacity:.9}
.login-err{color:var(--danger);font-size:13px;text-align:center;min-height:20px}
/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.nav{background:var(--primary);color:white;height:56px;display:flex;align-items:center;padding:0 20px;gap:8px;position:sticky;top:0;z-index:100;justify-content:space-between}
.nav-brand{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;cursor:pointer}
.nav-badge{background:var(--accent);color:var(--primary);border-radius:4px;padding:2px 8px;font-size:13px;font-weight:700}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:transparent;border:none;color:rgba(255,255,255,.65);padding:6px 13px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.nav-tab.active,.nav-tab:hover{background:rgba(255,255,255,.15);color:white}
.nav-right{font-size:13px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:8px}
.nav-bal{background:var(--accent);color:var(--primary);border-radius:20px;padding:3px 12px;font-weight:700;font-size:13px}
.nav-user-name{font-size:13px;color:rgba(255,255,255,.8)}
.btn-logout{background:rgba(255,255,255,.15);border:none;color:white;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
/* PAGES */
.page{display:none;padding:20px;max-width:1100px;margin:0 auto;width:100%}
.page.active{display:block}
/* CARDS */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:20px}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.stat{background:var(--bg);border-radius:8px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--primary)}
.stat-label{font-size:12px;color:var(--muted);margin-top:2px}
.badge-sm{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-up{background:#e8f7f0;color:var(--success)}
.badge-down{background:#fdeaea;color:var(--danger)}
/* FORM */
.fg{margin-bottom:14px}
.fl2{display:flex;flex-direction:column;gap:4px}
.fl2 label{font-size:12px;color:var(--muted)}
input.fi2,select.fi2,textarea.fi2{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text);width:100%}
input.fi2:focus,select.fi2:focus{outline:none;border-color:var(--primary)}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.btn-p{background:var(--primary);color:white}.btn-p:hover{opacity:.9}
.btn-s{background:var(--success);color:white}
.btn-d{background:var(--danger);color:white}
.btn-a{background:var(--accent);color:var(--primary)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm2{padding:5px 11px;font-size:12px}
/* TABS inside page */
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:7px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border:none;background:transparent}
.tab.active{background:white;color:var(--text)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-weight:500;font-size:12px}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
/* LIST ITEM */
.li{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);gap:12px}
.li:last-child{border-bottom:none}
.ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;background:var(--primary);flex-shrink:0}
/* TX */
.tx-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.tx-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tx-desc{flex:1}
.tx-title2{font-size:13px;font-weight:500}
.tx-date{font-size:11px;color:var(--muted)}
/* STOCK */
.stock-row{display:flex;align-items:center;padding:11px 12px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:background .1s}
.stock-row:hover{background:var(--bg)}
.stock-row.selected{background:#e8f0fa}
.slogo{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0}
.sinfo{flex:1}
.sname{font-size:13px;font-weight:600}
.scode{font-size:11px;color:var(--muted)}
.sprice{text-align:right}
.spval{font-size:14px;font-weight:700}
.spchg{font-size:11px}
.up{color:var(--danger)}.dn{color:#4a90d9}
.sparkline{width:56px;height:26px}
/* NEWS */
.news-item{padding:11px;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
/* STORE */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px}
.store-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;text-align:center;cursor:pointer;transition:.15s}
.store-item:hover{border-color:var(--accent);transform:translateY(-2px)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px;width:400px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:white;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;transform:translateY(80px);transition:transform .3s;pointer-events:none}
.toast.show{transform:translateY(0)}
/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.tgl{position:relative;width:44px;height:24px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-s{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:background .2s}
.tgl-s:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s}
.tgl input:checked+.tgl-s{background:var(--primary)}
.tgl input:checked+.tgl-s:before{transform:translateX(20px)}
/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:16px;font-weight:700}
/* SCROLL */
.scroll-y{overflow-y:auto;max-height:360px}
/* JOB CARD */
.job-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.job-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.job-name{font-size:15px;font-weight:600}
.job-badge{background:#e8f0fa;color:var(--primary);border-radius:4px;padding:2px 8px;font-size:12px;font-weight:600}
/* MARKET STATUS */
.mkt-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%}
.dot-open{background:var(--success);animation:blink 1.5s infinite}
.dot-closed{background:var(--muted)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
/* SALARY */
.salary-alert{background:#e8f7f0;border:1px solid #9FE1CB;border-radius:8px;padding:12px 16px;font-size:13px;color:#0F6E56;margin-bottom:14px}
/* PROFILE */
.profile-section{background:var(--bg);border-radius:8px;padding:14px;margin-bottom:12px}
/* CHART TABS */
.chart-tabs{display:flex;gap:4px;margin-bottom:12px}
.chart-tab{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--muted)}
.chart-tab.active{background:var(--primary);color:white;border-color:var(--primary)}
/* DISABLED */
.disabled-notice{background:#fff8e1;border:1px solid #f0d080;border-radius:8px;padding:14px;text-align:center;font-size:13px;color:#a07a00}
/* PASSWORD RESET */
.pw-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.pw-row:last-child{border-bottom:none}
/* SETTINGS */
.settings-st{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.preview-box{background:var(--bg);border-radius:8px;padding:12px;font-size:13px;margin-top:14px}
/* ACTIVITY STATUS */
.act-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;transition:border-color .3s,background .3s}
.act-card.status-pending{border-color:#ccc;background:#fafafa}
.act-card.status-done{border-color:#f0d080;background:#fffbe6}
.act-card.status-checked{border-color:#2d9e6b;background:#e8f7f0}
.act-card.status-absent{border-color:#d94f4f;background:#fdeaea}
.act-status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.dot-pending{background:#ccc}
.dot-done{background:#e8b84b}
.dot-checked{background:#2d9e6b}
.dot-absent{background:#d94f4f}
.btn-clean{background:#e8b84b;color:#1a3a5c;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
.btn-clean:hover{opacity:.9}
.btn-verify{background:#2d9e6b;color:white;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
.btn-verify:hover{opacity:.9}
.btn-absent-mark{background:#fdeaea;color:#d94f4f;border:1px solid #d94f4f;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
/* ATTENDANCE */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px}
.att-day{background:var(--bg);border-radius:6px;padding:6px;text-align:center;font-size:12px;border:1px solid var(--border)}
.att-day.att-active{background:#e8f7f0;border-color:#2d9e6b;color:#0F6E56;font-weight:600}
.att-day.att-absent{background:#fdeaea;border-color:#d94f4f;color:#d94f4f}
.att-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.att-chip{border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600}
</style>
</head>

];
const NEWS_T=[
  {type:'pos',t:'{n}, 신규 해외 계약 체결로 수출 증가 전망',i:'+2~5%'},
  {type:'pos',t:'{n} {s} 부문 호실적...영업이익 전년비 30% 증가',i:'+1~3%'},
  {type:'pos',t:'외국인 투자자, {n} 지분 대규모 매입',i:'+1~4%'},
  {type:'pos',t:'{n} 신제품 출시 예정...시장 기대감 고조',i:'+0.5~2%'},
  {type:'neg',t:'{n}, 원자재 가격 상승으로 수익성 악화 우려',i:'-1~3%'},
  {type:'neg',t:'{n} 주요 경쟁사 신규 진입...점유율 위협',i:'-1~2%'},

  {type:'neu',t:'{n} 2분기 실적 시장 예상치 부합',i:'±0.5%'},
  {type:'neu',t:'{n} 본사 사옥 이전 계획 발표',i:'0%'},
];

function genNews(c){
  const used=new Set(),news=[];
  while(news.length<3){const i=Math.floor(Math.random()*NEWS_T.length);if(used.has(i))continue;used.add(i);const t=NEWS_T[i];news.push({type:t.type,title:t.t.replace('{n}',c.name).replace('{s}',c.sector),impact:t.i,time:`${Math.floor(Math.random()*8+8)}:${String(Math.floor(Math.random()*6)*10).padStart(2,'0')}`});}
  return news.sort((a,b)=>a.time.localeCompare(b.time));
}

  {id:7,name:'태블릿 관리자',emoji:'📱',maxCount:1,salary:55,desc:'태블릿 기기 관리',page:'수업 시작 전 태블릿을 배포하고 수업 종료 후 수거 및 충전 여부를 확인합니다.'},

// generate initial stock data with monthly history
function genStockData(){
  const stocks={};
  COMPANIES.forEach(c=>{
    const base=Math.floor(Math.random()*40+10)*10;
    // daily history: 60 days
    const daily=[];
    let p=base;
    for(let i=60;i>=0;i--){p=Math.round(p*(1+(Math.random()-.48)*.04));daily.push(p);}
    // monthly: 12 months
    const monthly=[];
    p=Math.round(base*.7);
    for(let i=12;i>=0;i--){p=Math.round(p*(1+(Math.random()-.45)*.08));monthly.push(p);}
    stocks[c.code]={price:daily[daily.length-1],daily,monthly,news:genNews(c),prevClose:daily[daily.length-2]};
  });
  return stocks;
}

// assign default jobs
function assignDefaultJobs(){
  const assigns=[[1,5],[2,1],[3,2],[4,1],[5,3],[6,1],[7,1]]; // [jobId, count]
  let si=0;
  assigns.forEach(([jobId,count])=>{
    for(let i=0;i<count&&si<state.students.length;i++,si++){
      state.students[si].jobId=jobId;
    }
  });
}
assignDefaultJobs();

// ==================== SESSION ====================
let session={loggedIn:false,isTeacher:false,studentId:null};

function C(){return cfg.coinName;}
function fmt(n){return n.toLocaleString()+' '+C();}
function cur(){return state.students.find(s=>s.id===session.studentId);}
function jobOf(s){return s.jobId?state.jobs.find(j=>j.id===s.jobId):null;}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openModal(id){document.getElementById(id).classList.add('open');}
function addTx(student,amount,desc){
  student.transactions.push({amount,desc,date:new Date().toLocaleDateString('ko-KR')});
  if(amount>0)student.earned+=amount;else student.spent+=Math.abs(amount);
}

// ==================== LOGIN ====================
let loginType='student';
function setLoginType(t){
  loginType=t;
  document.querySelectorAll('.login-type-tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='student'?0:1)));
  document.getElementById('studentSelectWrap').style.display=t==='student'?'':'none';
  document.getElementById('loginErr').textContent='';
}
function populateLoginStudentSel(){
  const sel=document.getElementById('loginStudentSel');
  sel.innerHTML=state.students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}
function doLogin(){
  const pw=document.getElementById('loginPw').value;
  document.getElementById('loginErr').textContent='';
  if(loginType==='teacher'){
    if(pw!==cfg.teacherPw){document.getElementById('loginErr').textContent='비밀번호가 올바르지 않습니다';return;}
    session={loggedIn:true,isTeacher:true,studentId:null};
  } else {
    const id=parseInt(document.getElementById('loginStudentSel').value);
    const s=state.students.find(x=>x.id===id);
    if(!s||pw!==s.pw){document.getElementById('loginErr').textContent='비밀번호가 올바르지 않습니다';return;}
    session={loggedIn:true,isTeacher:false,studentId:id};
  }
  document.getElementById('loginPw').value='';
  startApp();
}
function logout(){
  session={loggedIn:false,isTeacher:false,studentId:null};
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  populateLoginStudentSel();
  applyLoginInfo();
}
function applyLoginInfo(){
  document.getElementById('loginBadge').textContent=`${cfg.grade}-${cfg.classNum}반`;
  document.getElementById('loginBankName').textContent=cfg.bankName;
}
function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  go('home');
}

// ==================== NAV ====================
function buildNav(){
  const tabs=document.getElementById('navTabs');
  const navBal=document.getElementById('navBal');
  document.getElementById('navBadge').textContent=`${cfg.grade}-${cfg.classNum}반`;
  document.getElementById('navBankName').textContent=cfg.bankName;
  if(session.isTeacher){
    document.getElementById('navUserName').textContent='👩‍🏫 교사';
    navBal.style.display='none';
    tabs.innerHTML=`
      <button class="nav-tab active" onclick="go('home')">🏠 홈</button>
      <button class="nav-tab" onclick="go('bank')">💳 통장</button>
      <button class="nav-tab" onclick="go('store')">🏪 상점</button>
      <button class="nav-tab" onclick="go('stock')">📈 주식</button>
      <button class="nav-tab" onclick="go('teacher')">⚙ 교사</button>`;
  } else {
    const s=cur();
    document.getElementById('navUserName').textContent=s.name;
    navBal.style.display='';
    navBal.textContent=`${s.balance.toLocaleString()} ${C()}`;
    const job=jobOf(s);
    let jobTab=job?`<button class="nav-tab" onclick="go('job')">💼 ${job.name}</button>`:'';
    tabs.innerHTML=`
      <button class="nav-tab active" onclick="go('home')">🏠 홈</button>
      <button class="nav-tab" onclick="go('bank')">💳 통장</button>
      <button class="nav-tab" onclick="go('store')">🏪 상점</button>
      <button class="nav-tab" onclick="go('stock')">📈 주식</button>
      ${jobTab}
      <button class="nav-tab" onclick="go('profile')">👤 내 정보</button>`;
  }
}
function updateNavBal(){
  if(!session.isTeacher&&cur()){
    document.getElementById('navBal').textContent=`${cur().balance.toLocaleString()} ${C()}`;
  }
}

// ==================== ROUTER ====================
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>{if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+page+"'"))t.classList.add('active');});
  renderPage(page);
}
function renderPage(p){
  if(p==='home')renderHome();
  else if(p==='bank')renderBank();
  else if(p==='store')renderStore();
  else if(p==='stock')renderStock();
  else if(p==='job')renderJob();
  else if(p==='profile')renderProfile();
  else if(p==='teacher')renderTeacher();
}
</script>

function portVal(s){let v=0;Object.entries(s.portfolio).forEach(([c,q])=>{v+=(state.stocks[c]?.price||0)*q;});return v;}

function bankTab(t){

  const s=session.isTeacher?null:cur();
  const pv=s?portVal(s):0;

    el.innerHTML=`<div class="card"><div class="card-title">교사 — 전체 잔액 현황</div>

    ${state.students.map(s=>`<tr><td>${s.name}</td><td>${s.balance.toLocaleString()} ${C()}</td><td>${portVal(s).toLocaleString()} ${C()}</td><td><b>${(s.balance+portVal(s)).toLocaleString()} ${C()}</b></td></tr>`).join('')}

  }

    <div class="card"><div class="card-title">${C()} 송금</div>
      <div class="fg"><div class="fl2"><label>받는 학생</label><select class="fi2" id="txTo">${others}</select></div></div>
      <div class="fg"><div class="fl2"><label>금액</label><input type="number" class="fi2" id="txAmt" placeholder="0" min="1"></div></div>
      <div class="fg"><div class="fl2"><label>메모</label><input type="text" class="fi2" id="txMemo" placeholder="(선택)"></div></div>
      <button class="btn btn-p" style="width:100%" onclick="doTransfer()">송금하기</button>
    </div>
    <div class="card"><div class="card-title">내 지갑</div>
      <div class="stat" style="margin-bottom:10px"><div class="stat-val">${s.balance.toLocaleString()} ${C()}</div><div class="stat-label">잔액</div></div>
      <div class="stat" style="margin-bottom:10px"><div class="stat-val">${pv.toLocaleString()} ${C()}</div><div class="stat-label">주식 평가액</div></div>
      <div class="stat"><div class="stat-val">${(s.balance+pv).toLocaleString()} ${C()}</div><div class="stat-label">총 자산</div></div>
    </div></div>`;
}
function doTransfer(){
  if(!cfg.allowTransfer)return toast('송금이 비활성화되어 있습니다');
  const s=cur();
  const toId=parseInt(document.getElementById('txTo').value);
  const amt=parseInt(document.getElementById('txAmt').value);
  const memo=document.getElementById('txMemo').value||'송금';
  if(!amt||amt<=0)return toast('금액을 입력하세요');
  if(amt>s.balance)return toast('잔액이 부족합니다');
  const to=state.students.find(x=>x.id===toId);
  s.balance-=amt;to.balance+=amt;
  addTx(s,-amt,`${to.name}에게 송금 (${memo})`);
  addTx(to,amt,`${s.name}으로부터 (${memo})`);
  toast(`${to.name}에게 ${fmt(amt)} 송금!`);
  renderBankTransfer();updateNavBal();
}

    </div></details>`).join('')}</div>`;return;

      <div class="tx-icon" style="background:${tx.amount>0?'#e8f7f0':'#fdeaea'}">${tx.amount>0?'📥':'📤'}</div>
      <div class="tx-desc"><div class="tx-title2">${tx.desc}</div><div class="tx-date">${tx.date}</div></div>
      <div style="font-size:13px;font-weight:700;color:${tx.amount>0?'var(--success)':'var(--danger)'}">${tx.amount>0?'+':''}${tx.amount.toLocaleString()} ${C()}</div>
    </div>`).join('')}

}

<script>

    el.innerHTML=state.storeItems.map(item=>`

    </div>`).join('');

function buyItem(id){
  if(!cfg.allowStore)return toast('상점 비활성화');
  const s=cur();const item=state.storeItems.find(x=>x.id===id);
  if(!item||item.stock<=0)return toast('재고 없음');
  if(s.balance<item.price)return toast('잔액 부족');
  s.balance-=item.price;item.stock--;s.items.push({...item});
  addTx(s,-item.price,`상점 구매: ${item.emoji} ${item.name}`);

}

// ==================== STOCK ====================
let stockChartInst=null;
function renderStock(){
  const el=document.getElementById('stockContent');
  el.innerHTML=`
  <div class="grid-2">
    <div class="card" style="grid-row:span 2">
      <div class="sec-head">
        <div class="sec-title">주식 시장</div>
        <div class="mkt-status"><div class="dot" id="mktDot"></div><span id="mktStatusTxt">확인 중</span></div>
      </div>
      <div id="stockList" style="overflow-y:auto;max-height:420px"></div>
    </div>
    <div class="card" id="stockDetailCard">
      <div id="stockDetail"><div style="text-align:center;color:var(--muted);padding:40px 0;font-size:14px">종목을 선택하세요</div></div>
    </div>
    <div class="card"><div class="card-title">오늘의 뉴스</div><div id="stockNewsList" style="overflow-y:auto;max-height:260px"></div></div>
  </div>
  <div class="card" style="margin-top:16px">
    <div class="card-title">내 포트폴리오</div>
    <div id="stockPortfolio"></div>
  </div>`;
  updateMarketStatus();
  renderStockList();
  renderStockNews();
  renderStockPortfolio();
}
function updateMarketStatus(){
  const open=isMarketOpen();
  const dot=document.getElementById('mktDot');
  const txt=document.getElementById('mktStatusTxt');
  if(!dot)return;
  dot.className='dot '+(open?'dot-open':'dot-closed');
  const now=new Date();
  txt.textContent=(open?'장 운영 중':'장 마감')+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
}
function isMarketOpen(){
  if(cfg.forceMarket)return true;
  const now=new Date(),h=now.getHours(),m=now.getMinutes(),mins=h*60+m,dow=now.getDay();
  return dow>=1&&dow<=5&&mins>=540&&mins<930;
}
function renderStockList(){
  const el=document.getElementById('stockList');if(!el)return;
  el.innerHTML=COMPANIES.map(c=>{
    const stk=state.stocks[c.code];
    const chg=((stk.price-stk.prevClose)/stk.prevClose*100).toFixed(2);
    const svg=sparkSVG(stk.daily.slice(-20),chg>=0);
    const sel=state.selectedStock===c.code;
    return`<div class="stock-row${sel?' selected':''}" onclick="selectStock('${c.code}')">
      <div class="slogo" style="background:${c.color}">${c.code[0]}</div>
      <div class="sinfo"><div class="sname">${c.name}</div><div class="scode">${c.code}·${c.sector}</div></div>
      ${svg}
      <div class="sprice"><div class="spval ${chg>=0?'up':'dn'}">${stk.price.toLocaleString()}</div><div class="spchg ${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'}${Math.abs(chg)}%</div></div>
    </div>`;}).join('');
}
function sparkSVG(data,up){
  const w=56,h=26,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*w).toFixed(1)},${(h-(v-min)/range*h).toFixed(1)}`).join(' ');
  return`<svg class="sparkline" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${up?'#d94f4f':'#4a90d9'}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}
function selectStock(code){
  state.selectedStock=code;
  renderStockList();
  const el=document.getElementById('stockDetail');if(!el)return;
  const c=COMPANIES.find(x=>x.code===code);
  const stk=state.stocks[code];
  const chg=((stk.price-stk.prevClose)/stk.prevClose*100).toFixed(2);
  const s=session.isTeacher?null:cur();
  const held=s?s.portfolio[code]||0:0;
  const canTrade=cfg.allowStock&&!session.isTeacher;
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:40px;height:40px;border-radius:9px;background:${c.color};display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:15px">${c.code[0]}</div>
      <div><div style="font-size:15px;font-weight:700">${c.name}</div><div style="font-size:11px;color:var(--muted)">${c.code}·${c.sector}</div></div>
    </div>
    <div style="font-size:22px;font-weight:700;color:${chg>=0?'var(--danger)':'#4a90d9'}">${stk.price.toLocaleString()}</div>
    <div style="font-size:13px;color:${chg>=0?'var(--danger)':'#4a90d9'};margin-bottom:8px">${chg>=0?'▲':'▼'}${Math.abs(chg)}% (전일 ${stk.prevClose.toLocaleString()})</div>
    <div class="chart-tabs">
      <button class="chart-tab ${state.chartType==='daily'?'active':''}" onclick="switchChartType('daily')">일별</button>
      <button class="chart-tab ${state.chartType==='monthly'?'active':''}" onclick="switchChartType('monthly')">월별</button>
    </div>
    <div style="height:160px;position:relative"><canvas id="stockChart"></canvas></div>
    ${!session.isTeacher?`<div style="font-size:13px;margin:10px 0">보유: <b>${held}주</b> (평가: ${(held*stk.price).toLocaleString()} ${C()})</div>`:''}
    ${canTrade?`<div style="display:flex;gap:8px">
      <button class="btn btn-d btn-sm2" style="flex:1" onclick="openTrade('buy')">매수</button>
      <button class="btn btn-o btn-sm2" style="flex:1" onclick="openTrade('sell')">매도</button>
    </div>`:''}`;
  drawStockChart(code);
}
function switchChartType(t){
  state.chartType=t;
  if(state.selectedStock)selectStock(state.selectedStock);
}
function drawStockChart(code){
  const canvas=document.getElementById('stockChart');if(!canvas)return;
  if(stockChartInst){stockChartInst.destroy();stockChartInst=null;}
  const stk=state.stocks[code];
  const data=state.chartType==='monthly'?stk.monthly:stk.daily.slice(-30);
  const labels=state.chartType==='monthly'?
    data.map((_,i)=>i===0?'12개월전':i===data.length-1?'현재':(data.length-1-i)+'개월전') :
    data.map((_,i)=>i===0?'30일전':i===data.length-1?'오늘':(data.length-1-i)+'일전');
  const c=COMPANIES.find(x=>x.code===code);
  stockChartInst=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:c.color,backgroundColor:c.color+'22',borderWidth:2,pointRadius:0,fill:true,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:true,ticks:{font:{size:10},maxTicksLimit:4}}}}
  });
}
function renderStockNews(){
  const el=document.getElementById('stockNewsList');if(!el)return;
  const all=[];
  COMPANIES.forEach(c=>state.stocks[c.code].news.forEach(n=>all.push({...n,cname:c.name,code:c.code,color:c.color})));
  all.sort((a,b)=>b.time.localeCompare(a.time));
  el.innerHTML=all.map(n=>`<div class="news-item">
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
      <span style="background:${n.color};color:white;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:600">${n.code}</span>
      <span style="font-size:11px;color:var(--muted)">${n.time}</span>
    </div>
    <div style="font-size:13px;font-weight:600">${n.title}</div>
    <div style="font-size:11px;margin-top:2px;color:${n.type==='pos'?'var(--success)':n.type==='neg'?'var(--danger)':'var(--muted)'}">예상 영향: ${n.impact}</div>
  </div>`).join('');
}
function renderStockPortfolio(){

function openTrade(type){
  if(!cfg.allowStock||session.isTeacher)return;
  const code=state.selectedStock;if(!code)return;
  const c=COMPANIES.find(x=>x.code===code);const stk=state.stocks[code];const s=cur();const held=s.portfolio[code]||0;
  document.getElementById('msTitle').textContent=`${c.name} ${type==='buy'?'매수':'매도'}`;
  document.getElementById('msBody').innerHTML=`<div style="margin-bottom:12px"><div style="font-size:12px;color:var(--muted)">현재가</div><div style="font-size:20px;font-weight:700">${stk.price.toLocaleString()} ${C()}</div></div>
  <div class="fg"><div class="fl2"><label>수량 (${type==='buy'?'잔액 '+s.balance.toLocaleString():held+'주 보유'})</label>
  <input type="number" class="fi2" id="tradeQty" value="1" min="1" max="${type==='buy'?Math.floor(s.balance/stk.price):held}"></div></div>
  <div id="tradeCost" style="font-size:13px;color:var(--muted)">합계: ${stk.price.toLocaleString()} ${C()}</div>`;
  document.getElementById('tradeQty').oninput=function(){document.getElementById('tradeCost').textContent=`합계: ${((parseInt(this.value)||1)*stk.price).toLocaleString()} ${C()}`;};
  document.getElementById('msBuyBtn').style.display=type==='buy'?'':'none';
  document.getElementById('msSellBtn').style.display=type==='sell'?'':'none';
  openModal('modalStock');
}
function doStockBuy(){
  const s=cur();const code=state.selectedStock;const stk=state.stocks[code];
  const qty=parseInt(document.getElementById('tradeQty').value)||1;
  const total=qty*stk.price;
  if(total>s.balance)return toast('잔액 부족');
  s.balance-=total;s.portfolio[code]=(s.portfolio[code]||0)+qty;
  addTx(s,-total,`주식 매수: ${COMPANIES.find(c=>c.code===code).name} ${qty}주`);
  toast(`${COMPANIES.find(c=>c.code===code).name} ${qty}주 매수!`);
  closeModal('modalStock');renderStock();updateNavBal();if(state.selectedStock)selectStock(state.selectedStock);
}
function doStockSell(){
  const s=cur();const code=state.selectedStock;const stk=state.stocks[code];
  const qty=parseInt(document.getElementById('tradeQty').value)||1;
  const held=s.portfolio[code]||0;
  if(qty>held)return toast('수량 부족');
  const total=qty*stk.price;
  s.balance+=total;s.portfolio[code]=held-qty;
  addTx(s,total,`주식 매도: ${COMPANIES.find(c=>c.code===code).name} ${qty}주`);
  toast(`매도 완료!`);
  closeModal('modalStock');renderStock();updateNavBal();if(state.selectedStock)selectStock(state.selectedStock);
}

function todayKey(){return new Date().toLocaleDateString('ko-KR');}

// 환경 관리자 중 몇 번째인지 반환 (1 = 청소/분리수거 담당, 2+ = 개인자리 담당)
function getVerifierIndex(s){
  const verifiers=state.students.filter(x=>jobOf(x)&&jobOf(x).name==='환경 관리자')
    .sort((a,b)=>a.id-b.id);
  const idx=verifiers.findIndex(x=>x.id===s.id);
  return idx; // 0-based: 0=관리자1, 1이상=관리자2
}

function calcExpectedSalary(s){
  const job=jobOf(s);if(!job)return 0;
  const absent=s.attendanceAbsent||0;
  const deductRate=absent>=3?0.5:absent>=1?(absent*0.1):0;
  return Math.round(job.salary*(1-deductRate));
}
function markCleanDone(studentId){
  state.cleanStatus[studentId]='done';
  const s=state.students.find(x=>x.id===studentId);
  toast(`${s.name} 청소 완료! 환경 관리자 1의 확인을 기다립니다.`);
  renderJob();
}
function verifyClean(studentId){
  state.cleanStatus[studentId]='checked';
  const s=state.students.find(x=>x.id===studentId);
  const today=todayKey();

  s.activityLog[today]=true;

}
function markAbsentClean(studentId){

function markAllSeats(status){

    state.seatStatus[s.id]=status;

  renderJob();

function markMySeats(vIdx, status){
  // 내 담당 구역만 처리
  const allStudents=[...state.students].sort((a,b)=>a.id-b.id);
  const seatVerifiers=state.students.filter(x=>jobOf(x)&&jobOf(x).name==='환경 관리자'&&getVerifierIndex(x)>=1);
  const numSeatVerifiers=seatVerifiers.length||1;
  const mySlot=vIdx-1;
  const chunkSize=Math.ceil(allStudents.length/numSeatVerifiers);
  const myStudents=allStudents.slice(mySlot*chunkSize, mySlot*chunkSize+chunkSize);
  myStudents.forEach(s=>{ state.seatStatus[s.id]=status; dbSaveSeatStatus(s.id,status); });
  toast(`담당 구역 전원 ${status==='clean'?'✅ 청결':'❌ 정리 필요'} 처리`);
  renderJob();
}
function resetMySeats(vIdx){
  const allStudents=[...state.students].sort((a,b)=>a.id-b.id);
  const seatVerifiers=state.students.filter(x=>jobOf(x)&&jobOf(x).name==='환경 관리자'&&getVerifierIndex(x)>=1);
  const numSeatVerifiers=seatVerifiers.length||1;
  const mySlot=vIdx-1;
  const chunkSize=Math.ceil(allStudents.length/numSeatVerifiers);
  const myStudents=allStudents.slice(mySlot*chunkSize, mySlot*chunkSize+chunkSize);
  myStudents.forEach(s=>{ state.seatStatus[s.id]='unchecked'; });
  if(isDbReady()) myStudents.forEach(s=>sb.from('seat_status').delete().eq('student_id',s.id));
  toast('담당 구역 초기화');
  renderJob();
}

}

function teachMarkActivity(studentId, status){
  const today=todayKey();
  if(!state.jobActivity[today]) state.jobActivity[today]={};
  const s=state.students.find(x=>x.id===studentId);
  const prev=state.jobActivity[today][studentId];
  // Undo previous absent count if changing
  if(prev==='absent'&&status==='active'){
    s.attendanceAbsent=Math.max(0,(s.attendanceAbsent||0)-1);
    if(s.activityLog) s.activityLog[today]=true;
  } else if(status==='absent'&&prev!=='absent'){
    s.attendanceAbsent=(s.attendanceAbsent||0)+1;
    if(!s.activityLog)s.activityLog={};
    s.activityLog[today]=false;
  } else if(status==='active'){
    if(!s.activityLog)s.activityLog={};
    s.activityLog[today]=true;
  }
  state.jobActivity[today][studentId]=status;
  toast(`${s.name} ${status==='active'?'출석':'결근'} 처리`);
  renderTeachActivity();
}
function markAllActive(jobId){
  const assigned=state.students.filter(s=>s.jobId===jobId);
  assigned.forEach(s=>teachMarkActivity(s.id,'active'));
}
function markAllAbsent(jobId){
  const assigned=state.students.filter(s=>s.jobId===jobId);
  assigned.forEach(s=>teachMarkActivity(s.id,'absent'));
}

function parseBulkText(text){
  return text.split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>0)
    .map(l=>{
      // "1 강하린" 또는 "1. 강하린" 또는 "강하린" 형식 모두 처리
      const m=l.match(/^(\d+)[.\s]+(.+)$/);
      return m ? {num:parseInt(m[1]), name:m[2].trim()} : {num:null, name:l.trim()};
    })
    .filter(x=>x.name.length>0);
}

function previewBulk(){
  const text=document.getElementById('bulkText').value;
  const bal=parseInt(document.getElementById('bulkBal').value)||200;

      ⚠️ 등록 실행 시 기존 학생 데이터가 <b>모두 삭제</b>되고 새로 등록됩니다.

      <div class="fg"><div class="fl2"><label>사유</label><input type="text" class="fi2" id="tcAllReason" placeholder="예: 청소 완료"></div></div>
      <button class="btn btn-a" style="width:100%" onclick="teachGiveAll()">전체 학생 지급</button>
      <div style="margin-top:12px">
        <button class="btn btn-p" style="width:100%" onclick="paySalaries()">💰 월급 지급 (17일 실행)</button>
      </div>
    </div>
  </div>`;

function teachGive(sign){
  const id=parseInt(document.getElementById('tcSel').value);
  const amt=parseInt(document.getElementById('tcAmt').value);
  const reason=document.getElementById('tcReason').value||(sign>0?'교사 지급':'교사 차감');
  if(!amt||amt<=0)return toast('금액 입력');
  const s=state.students.find(x=>x.id===id);
  if(sign<0&&s.balance<amt)return toast('잔액 부족');
  s.balance+=sign*amt;
  addTx(s,sign*amt,`교사: ${reason}`);
  toast(`${s.name} ${Math.abs(sign*amt).toLocaleString()} ${C()} ${sign>0?'지급':'차감'}`);
}
function teachGiveAll(){
  const amt=parseInt(document.getElementById('tcAllAmt').value);
  const reason=document.getElementById('tcAllReason').value||'전체 보상';
  if(!amt||amt<=0)return toast('금액 입력');
  state.students.forEach(s=>{s.balance+=amt;addTx(s,amt,`교사(전체): ${reason}`);});
  toast(`전체 ${state.students.length}명에게 ${amt.toLocaleString()} ${C()} 지급`);
}
function paySalaries(){
  let count=0;
  const today=new Date().toLocaleDateString('ko-KR');
  state.students.forEach(s=>{
    const job=jobOf(s);
    if(job){
      // Count absent days this month
      const absent=s.attendanceAbsent||0;
      const deductRate=absent>=3?0.5:absent>=1?(absent*0.1):0; // 10% per absent day, max 50%
      const actualSalary=Math.round(job.salary*(1-deductRate));
      const deducted=job.salary-actualSalary;
      s.balance+=actualSalary;
      let txDesc=`월급: ${job.emoji}${job.name} (${job.salary}${C()})`;
      if(deducted>0) txDesc+=` ※결근${absent}일 -${deducted}${C()} 차감`;
      addTx(s,actualSalary,txDesc);
      // Reset monthly attendance counter
      s.attendanceAbsent=0;
      count++;
    }
  });
  toast(`💰 ${count}명에게 월급 지급 완료! (결근 차감 적용)`);
  if(document.getElementById('teach-activity').style.display!=='none') renderTeachActivity();
}

// ---- LOAD ALL STATE FROM DB ----
async function loadStateFromDb(){
  if(!isDbReady())return false;
  try{
    setDbStatus('connecting');
    // 1. config
    const {data:cfgRow}=await sb.from('config').select('*').single();
    if(cfgRow){
      cfg.grade=cfgRow.grade??cfg.grade;
      cfg.classNum=cfgRow.class_num??cfg.classNum;
      cfg.bankName=cfgRow.bank_name??cfg.bankName;
      cfg.coinName=cfgRow.coin_name??cfg.coinName;
      cfg.coinSymbol=cfgRow.coin_symbol??cfg.coinSymbol;
      cfg.teacherPw=cfgRow.teacher_pw??cfg.teacherPw;
      cfg.allowTransfer=cfgRow.allow_transfer??cfg.allowTransfer;
      cfg.allowStock=cfgRow.allow_stock??cfg.allowStock;
      cfg.allowStore=cfgRow.allow_store??cfg.allowStore;
      cfg.showBalance=cfgRow.show_balance??cfg.showBalance;
      cfg.forceMarket=cfgRow.force_market??cfg.forceMarket;
    }
    // 2. students
    const {data:students}=await sb.from('students').select('*').order('id');
    if(students&&students.length){
      state.students=students.map(r=>({
        id:r.id,name:r.name,pw:r.pw,balance:r.balance,
        transactions:r.transactions||[],portfolio:r.portfolio||{},
        items:r.items||[],earned:r.earned||0,spent:r.spent||0,
        jobId:r.job_id,activityLog:r.activity_log||{},attendanceAbsent:r.attendance_absent||0,
      }));
    }
    // 3. jobs
    const {data:jobs}=await sb.from('jobs').select('*').order('id');
    if(jobs&&jobs.length){
      state.jobs=jobs.map(r=>({id:r.id,name:r.name,emoji:r.emoji,maxCount:r.max_count,salary:r.salary,desc:r.description,page:r.page_content||''}));
    }
    // 4. store items
    const {data:items}=await sb.from('store_items').select('*').order('id');
    if(items&&items.length){
      state.storeItems=items.map(r=>({id:r.id,name:r.name,emoji:r.emoji,price:r.price,stock:r.stock,desc:r.description||''}));
    }
    // 5. stocks
    const {data:stocks}=await sb.from('stocks').select('*');
    if(stocks&&stocks.length){
      stocks.forEach(r=>{
        if(state.stocks[r.code]){
          state.stocks[r.code].price=r.price;
          state.stocks[r.code].prevClose=r.prev_close;
          if(r.daily)state.stocks[r.code].daily=r.daily;
          if(r.monthly)state.stocks[r.code].monthly=r.monthly;
        }
      });
    }
    // 6. clean status
    const {data:clean}=await sb.from('clean_status').select('*');
    if(clean)clean.forEach(r=>{state.cleanStatus[r.student_id]=r.status;});

    // 7. seat status
    const {data:seats}=await sb.from('seat_status').select('*');
    if(seats)seats.forEach(r=>{state.seatStatus[r.student_id]=r.status;});

    populateLoginStudentSel();
    applyLoginInfo();
    applyGlobalCfg();
    setDbStatus('online');
    return true;
  }catch(e){
    console.error('DB 로드 실패',e);
    setDbStatus('error');
    return false;
  }
}

// ---- REALTIME SUBSCRIPTIONS ----
function subscribeRealtime(){
  if(!isDbReady())return;
  // Unsubscribe existing
  realtimeSubs.forEach(s=>sb.removeChannel(s));
  realtimeSubs=[];

  // students changes
  const ch1=sb.channel('students-changes')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'students'},payload=>{
      const r=payload.new;
      const s=state.students.find(x=>x.id===r.id);
      if(s&&s.id!==session.studentId){
        Object.assign(s,{balance:r.balance,transactions:r.transactions||[],portfolio:r.portfolio||{},
          items:r.items||[],earned:r.earned||0,spent:r.spent||0,jobId:r.job_id,
          activityLog:r.activity_log||{},attendanceAbsent:r.attendance_absent||0});
        // If teacher is viewing, refresh
        refreshCurrentPage();
      } else if(s&&s.id===session.studentId){
        Object.assign(s,{balance:r.balance,transactions:r.transactions||[],portfolio:r.portfolio||{},
          items:r.items||[],earned:r.earned||0,spent:r.spent||0,jobId:r.job_id,
          activityLog:r.activity_log||{},attendanceAbsent:r.attendance_absent||0});
        updateNavBal();
        refreshCurrentPage();
      }
    }).subscribe();
  realtimeSubs.push(ch1);

  // clean_status changes
  const ch2=sb.channel('clean-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'clean_status'},payload=>{
      const r=payload.new||payload.old;
      if(r){state.cleanStatus[r.student_id]=r.status;}
      refreshCurrentPage();
    }).subscribe();
  realtimeSubs.push(ch2);

  // seat_status changes
  const ch2b=sb.channel('seat-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'seat_status'},payload=>{
      const r=payload.new||payload.old;
      if(r){state.seatStatus[r.student_id]=r.status;}
      refreshCurrentPage();
    }).subscribe();
  realtimeSubs.push(ch2b);

  // store_items changes
  const ch3=sb.channel('store-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'store_items'},payload=>{
      const r=payload.new;
      if(r){const idx=state.storeItems.findIndex(x=>x.id===r.id);
        const item={id:r.id,name:r.name,emoji:r.emoji,price:r.price,stock:r.stock,desc:r.description||''};
        if(idx>=0)state.storeItems[idx]=item;else state.storeItems.push(item);
        refreshCurrentPage();
      }
    }).subscribe();
  realtimeSubs.push(ch3);

  // config changes
  const ch4=sb.channel('config-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'config'},payload=>{
      const r=payload.new;
      if(r){
        cfg.bankName=r.bank_name??cfg.bankName;cfg.coinName=r.coin_name??cfg.coinName;
        cfg.coinSymbol=r.coin_symbol??cfg.coinSymbol;cfg.allowTransfer=r.allow_transfer??cfg.allowTransfer;
        cfg.allowStock=r.allow_stock??cfg.allowStock;cfg.allowStore=r.allow_store??cfg.allowStore;
        cfg.showBalance=r.show_balance??cfg.showBalance;cfg.forceMarket=r.force_market??cfg.forceMarket;
        applyGlobalCfg();refreshCurrentPage();
      }
    }).subscribe();
  realtimeSubs.push(ch4);

  setDbStatus('online');
}

function refreshCurrentPage(){
  const active=document.querySelector('.page.active');
  if(!active)return;
  const id=active.id.replace('page-','');
  renderPage(id);
}

// ---- DB INIT: seed initial data if tables are empty ----
async function dbSeedIfEmpty(){
  if(!isDbReady())return;
  // seed config
  const {data:cfgRows,error}=await sb.from('config').select('id').limit(1);
  if(!cfgRows||cfgRows.length===0){
    await sb.from('config').insert({
      id:1,grade:cfg.grade,class_num:cfg.classNum,bank_name:cfg.bankName,
      coin_name:cfg.coinName,coin_symbol:cfg.coinSymbol,teacher_pw:cfg.teacherPw,
      allow_transfer:true,allow_stock:true,allow_store:true,show_balance:true,force_market:false,
    });
  }
  // seed students
  const {data:stuRows}=await sb.from('students').select('id').limit(1);
  if(!stuRows||stuRows.length===0){
    const rows=state.students.map(s=>({
      id:s.id,name:s.name,pw:s.pw,balance:s.balance,
      transactions:[],portfolio:{},items:[],earned:s.balance,spent:0,
      job_id:s.jobId,activity_log:{},attendance_absent:0,
    }));
    await sb.from('students').insert(rows);
  }
  // seed jobs
  const {data:jobRows}=await sb.from('jobs').select('id').limit(1);
  if(!jobRows||jobRows.length===0){
    const rows=state.jobs.map(j=>({id:j.id,name:j.name,emoji:j.emoji,max_count:j.maxCount,salary:j.salary,description:j.desc,page_content:j.page||''}));
    await sb.from('jobs').insert(rows);
  }
  // seed store_items
  const {data:itemRows}=await sb.from('store_items').select('id').limit(1);
  if(!itemRows||itemRows.length===0){
    const rows=state.storeItems.map(i=>({id:i.id,name:i.name,emoji:i.emoji,price:i.price,stock:i.stock,description:i.desc}));
    await sb.from('store_items').insert(rows);
  }
  // seed stocks
  await dbInitStocks();
}

// ---- PATCH: DB 저장 연동 (함수 재할당 방식 — 호이스팅 문제 없음) ----
// 원본 함수를 변수에 저장한 뒤 window 전역에 화살표 함수로 덮어씁니다.

const _orig = {
  markCleanDone: markCleanDone,
  verifyClean: verifyClean,
  markAbsentClean: markAbsentClean,
  teachMarkActivity: teachMarkActivity,
  paySalaries: paySalaries,
  teachGive: teachGive,
  teachGiveAll: teachGiveAll,
  addStudent: addStudent,
  removeStudent: removeStudent,
  saveJob: saveJob,
  deleteJob: deleteJob,
  addStoreItem: addStoreItem,
  removeItem: removeItem,
  restockItem: restockItem,
  buyItem: buyItem,
  saveCfg: saveCfg,
  saveCfgToggles: saveCfgToggles,
  doStockBuy: doStockBuy,
  doStockSell: doStockSell,
  doTransfer: doTransfer,
  changePw: changePw,
  editStudentPw: editStudentPw,
  toggleAssign: toggleAssign,
  updateNavBal: updateNavBal,
};

markCleanDone = (studentId) => {
  _orig.markCleanDone(studentId);
  dbSaveCleanStatus(studentId, 'done');
};
verifyClean = (studentId) => {
  _orig.verifyClean(studentId);
  dbSaveCleanStatus(studentId, 'checked');
  const s = state.students.find(x => x.id === studentId);
  if(s) dbSaveStudent(s);
};
markAbsentClean = (studentId) => {
  _orig.markAbsentClean(studentId);
  dbSaveCleanStatus(studentId, 'absent');
  const s = state.students.find(x => x.id === studentId);
  if(s) dbSaveStudent(s);
};
teachMarkActivity = (studentId, status) => {
  _orig.teachMarkActivity(studentId, status);
  const s = state.students.find(x => x.id === studentId);
  if(s) dbSaveStudent(s);
};
paySalaries = async () => {
  _orig.paySalaries();
  for(const s of state.students){ if(s.jobId) await dbSaveStudent(s); }
};
teachGive = (sign) => {
  _orig.teachGive(sign);
  const id = parseInt(document.getElementById('tcSel')?.value);
  const s = state.students.find(x => x.id === id);
  if(s) dbSaveStudent(s);
};
teachGiveAll = async () => {
  _orig.teachGiveAll();
  for(const s of state.students) await dbSaveStudent(s);
};
addStudent = async () => {
  _orig.addStudent();
  const s = state.students[state.students.length - 1];
  if(s && isDbReady()){
    await sb.from('students').insert({
      id:s.id, name:s.name, pw:s.pw, balance:s.balance,
      transactions:[], portfolio:{}, items:[], earned:s.balance, spent:0,
      job_id:null, activity_log:{}, attendance_absent:0,
    });
  }
};
removeStudent = async (id) => {
  _orig.removeStudent(id);
  if(isDbReady()) await sb.from('students').delete().eq('id', id);
};
saveJob = () => {
  _orig.saveJob();
  const id = document.getElementById('ajId').value;
  if(id){ const j=state.jobs.find(x=>x.id===parseInt(id)); if(j) dbSaveJob(j); }
  else { const j=state.jobs[state.jobs.length-1]; if(j) dbSaveJob(j); }
};
deleteJob = (id) => { _orig.deleteJob(id); dbDeleteJob(id); };
addStoreItem = () => { _orig.addStoreItem(); const i=state.storeItems[state.storeItems.length-1]; if(i) dbSaveStoreItem(i); };
removeItem = (id) => { _orig.removeItem(id); dbDeleteStoreItem(id); };
restockItem = (id) => { _orig.restockItem(id); const i=state.storeItems.find(x=>x.id===id); if(i) dbSaveStoreItem(i); };
buyItem = async (id) => {
  _orig.buyItem(id);
  const s = cur(); if(s) await dbSaveStudent(s);
  const item = state.storeItems.find(x => x.id === id); if(item) dbSaveStoreItem(item);
};
saveCfg = () => { _orig.saveCfg(); dbSaveConfig(); };
saveCfgToggles = () => { _orig.saveCfgToggles(); dbSaveConfig(); };
doStockBuy = () => { _orig.doStockBuy(); const s=cur(); if(s) dbSaveStudent(s); };
doStockSell = () => { _orig.doStockSell(); const s=cur(); if(s) dbSaveStudent(s); };
doTransfer = async () => { _orig.doTransfer(); for(const s of state.students) await dbSaveStudent(s); };
changePw = async () => { _orig.changePw(); const s=cur(); if(s) await dbSaveStudent(s); };
editStudentPw = async (id) => { _orig.editStudentPw(id); const s=state.students.find(x=>x.id===id); if(s) await dbSaveStudent(s); };
toggleAssign = async (studentId, jobId) => { _orig.toggleAssign(studentId, jobId); const s=state.students.find(x=>x.id===studentId); if(s) await dbSaveStudent(s); };

// 주식 저장 (5번마다 throttle)
let _stockSaveCounter = 0;
updateNavBal = () => {
  _orig.updateNavBal();
  _stockSaveCounter++;
  if(_stockSaveCounter % 5 === 0 && isDbReady()){
    COMPANIES.forEach(c => dbSaveStock(c.code));
  }
};

// ==================== APP BOOT WITH DB ====================
async function bootApp(){
  initSupabase();
  if(isDbReady()){
    setDbStatus('connecting');
    await dbSeedIfEmpty();
    await loadStateFromDb();
    subscribeRealtime();
  } else {
    setDbStatus('offline');
    console.warn('Supabase URL이 설정되지 않았습니다. 오프라인 모드로 실행됩니다.');
  }
  populateLoginStudentSel();
  applyLoginInfo();
}

bootApp();
</script>
